 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Links Elite | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --color-mid: #3b82f6; --color-dark: #050a14; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background-color: #000; overflow: hidden; }

        /* الخلفية الرخامية 4K */
        .color-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--color-mid), var(--color-dark), var(--color-mid)); background-size: 400% 400%; animation: flow 10s ease infinite; z-index: -2; }
        .marble-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('img.jpg/background img.jpg'); background-size: cover; background-position: center; mix-blend-mode: multiply; z-index: -1; filter: contrast(1.2) brightness(1.1); }
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .sidebar { position: fixed; left: 0; top: 0; width: 70px; height: 100vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; padding-top: 40px; z-index: 100; border-right: 1px solid rgba(255,255,255,0.1); }
        .side-dot { width: 35px; height: 35px; border-radius: 50%; margin-bottom: 15px; cursor: pointer; border: 2px solid white; transition: 0.3s; }

        .expanded-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(30px); border-radius: 50px; padding: 60px 45px; width: 95%; max-width: 530px; text-align: center; z-index: 10; box-shadow: 0 50px 100px rgba(0,0,0,0.4); position: relative; }
        
        .profile-section { position: relative; margin: -120px auto 30px; display: inline-block; }
        .avatar-main { width: 135px; height: 135px; border-radius: 50%; border: 8px solid white; background: #fff; overflow: hidden; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .upload-hint { position: absolute; right: -140px; top: 50%; transform: translateY(-50%); background: #111; color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; white-space: nowrap; }

        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.9); padding: 15px 0; color: white; text-align: center; z-index: 50; }
    </style>
</head>
<body>

    <div class="color-base" id="themeLayer"></div>
    <div class="marble-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="side-dot" style="background: #3b82f6;" onclick="updateTheme('#3b82f6')"></div>
        <div class="side-dot" style="background: #df0505;" onclick="updateTheme('#df0505')"></div>
        <div class="side-dot" style="background: #10b981;" onclick="updateTheme('#10b981')"></div>
        <div class="side-dot" style="background: #a855f7;" onclick="updateTheme('#a855f7')"></div>
        <label class="w-9 h-9 bg-white rounded-full flex items-center justify-center cursor-pointer border border-gray-300 shadow-sm">
            <i class="fas fa-eye-dropper text-gray-600 text-xs"></i>
            <input type="color" oninput="updateTheme(this.value)" class="hidden">
        </label>
    </div>

    <div class="expanded-card">
        <div class="profile-section">
            <div class="avatar-main" id="avatarBox" onclick="document.getElementById('fileIn').click()">
                <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                <input type="file" id="fileIn" hidden onchange="loadImg(this)" accept="image/*">
            </div>
            <div id="hint" class="upload-hint">إضغط لتحديد صورة</div>
        </div>

        <h1 id="uName" contenteditable="true" class="text-3xl font-black mb-2 text-gray-800 outline-none">إسم المستخدم</h1>
        <p id="uBio" contenteditable="true" class="text-gray-400 text-base mb-10 outline-none">أضف نبذتك الشخصية هنا...</p>

        <div id="linksContainer" class="space-y-4 mb-10 text-right"></div>

        <div id="editorUI" class="flex gap-3 mb-6">
            <input type="text" id="linkIn" class="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm border border-gray-200" placeholder="أدخل الرابط الجديد...">
            <button onclick="addL()" class="p-5 bg-white rounded-3xl shadow-md text-blue-600 hover:bg-blue-50">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <button id="genBtn" onclick="generateFinalLink()" class="w-full py-5 bg-white text-blue-700 rounded-full font-black shadow-xl uppercase text-[11px] tracking-[5px] border border-blue-50 hover:bg-blue-50 transition-all">
            توليد الرابط النهائي <i class="fas fa-magic ml-2"></i>
        </button>
    </div>

    <footer>
        <p class="text-[9px] opacity-30 uppercase tracking-widest">© 2026 جميع الحقوق محفوظة</p>
    </footer>

    <script>
        let list = [];

        function updateTheme(hex) {
            const mid = hex;
            let r = parseInt(mid.slice(1,3), 16), g = parseInt(mid.slice(3,5), 16), b = parseInt(mid.slice(5,7), 16);
            const dark = `rgb(${r*0.15}, ${g*0.15}, ${b*0.15})`;
            document.documentElement.style.setProperty('--color-mid', mid);
            document.documentElement.style.setProperty('--color-dark', dark);
        }

        function loadImg(i) {
            if (i.files && i.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('pImg').src = e.target.result;
                reader.readAsDataURL(i.files[0]);
            }
        }

        function addL() {
            const v = document.getElementById('linkIn').value;
            if(!v) return;
            list.push(v);
            draw();
            document.getElementById('linkIn').value = '';
        }

        function getIcon(url) {
            const u = url.toLowerCase();
            if(u.includes('instagram')) return 'fab fa-instagram';
            if(u.includes('twitter') || u.includes('x.com')) return 'fab fa-x-twitter';
            if(u.includes('facebook')) return 'fab fa-facebook';
            if(u.includes('linkedin')) return 'fab fa-linkedin';
            if(u.includes('youtube')) return 'fab fa-youtube';
            if(u.includes('snapchat')) return 'fab fa-snapchat';
            if(u.includes('mailto') || u.includes('@')) return 'fas fa-envelope';
            return 'fas fa-link';
        }

        function draw() {
            const c = document.getElementById('linksContainer');
            const isViewMode = new URLSearchParams(window.location.search).has('v');
            c.innerHTML = '';
            list.forEach((l, i) => {
                const finalUrl = l.startsWith('http') ? l : `https://${l}`;
                c.innerHTML += `
                <div class="bg-gray-50 p-6 rounded-3xl flex justify-between items-center text-sm border border-gray-100 shadow-sm hover:shadow-md transition cursor-pointer" onclick="window.open('${finalUrl}', '_blank')">
                    <div class="flex items-center gap-4">
                        <i class="${getIcon(l)} text-2xl text-blue-600"></i>
                        <span class="font-bold text-gray-700 truncate w-48">${l}</span>
                    </div>
                    ${!isViewMode ? `<i class="fas fa-trash-can text-red-300 p-2 hover:text-red-500" onclick="event.stopPropagation(); list.splice(${i},1); draw()"></i>` : ''}
                </div>`;
            });
        }

        async function generateFinalLink() {
            const img = document.getElementById('pImg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // ضغط حقيقي 150px
            canvas.width = 150; canvas.height = 150;
            ctx.drawImage(img, 0, 0, 150, 150);
            
            // ضغط JPEG فائق لتقصير الرابط (جودة 0.3)
            const compressedImg = canvas.toDataURL('image/jpeg', 0.3);

            const data = {
                n: document.getElementById('uName').innerText,
                b: document.getElementById('uBio').innerText,
                l: list,
                c: document.documentElement.style.getPropertyValue('--color-mid') || '#3b82f6',
                img: compressedImg
            };

            try {
                const s = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const url = window.location.origin + window.location.pathname + "?v=" + s;
                await navigator.clipboard.writeText(url);
                alert("🚀 تم توليد الرابط بنجاح! الرابط الآن مضغوط (150px) وقابل للنشر.");
            } catch(e) { alert("حدث خطأ في النسخ."); }
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('v')) {
                const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                document.getElementById('uName').innerText = d.n;
                document.getElementById('uBio').innerText = d.b;
                document.getElementById('pImg').src = d.img;
                list = d.l;
                updateTheme(d.c);
                draw();
                
                // قفل التعديل نهائياً للمشاهد
                document.getElementById('uName').contentEditable = "false";
                document.getElementById('uBio').contentEditable = "false";
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('editorUI').style.display = 'none';
                document.getElementById('genBtn').style.display = 'none';
                document.getElementById('hint').style.display = 'none';
                document.getElementById('avatarBox').onclick = null;
            }
        }
    </script>
</body>
</html>
