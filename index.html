   <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bio-Links | Hussien Ehab Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-light: #60a5fa;
            --color-mid: #3b82f6;
            --color-dark: #1e3a8a;
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #000; overflow-x: hidden;
        }

        /* خلفية الألوان والرخام المتحرك */
        .color-base {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, var(--color-light), var(--color-mid), var(--color-dark), var(--color-mid), var(--color-light));
            background-size: 400% 400%; animation: rgbFlow 12s linear infinite;
            z-index: -2; opacity: 0.9;
        }

        .marble-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('img.jpg/backgroundimg.jpg'); 
            background-size: cover; background-position: center;
            z-index: -1; opacity: 0.5; mix-blend-mode: overlay; pointer-events: none;
        }

        @keyframes rgbFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* نظام الـ Tooltip الاحترافي الذي أعجبك */
        [data-tip] { position: relative; }
        [data-tip]:hover::after {
            content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); color: #fff; padding: 10px 18px; border-radius: 12px;
            font-size: 11px; white-space: pre-wrap; text-align: center; z-index: 1000;
            border: 1px solid var(--color-light); box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            line-height: 1.6; pointer-events: none; animation: fadeInScale 0.3s ease;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateX(-50%) scale(0.8); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* الكارت الرئيسي بتنسيق فخم */
        .main-card {
            position: relative; background: #c9c9c9; border-radius: 60px; padding: 140px 45px 80px 45px; 
            width: 95%; max-width: 580px; text-align: center; z-index: 10; 
            box-shadow: 0 60px 150px rgba(0,0,0,0.8); margin-top: 180px; margin-bottom: 80px;
        }

        /* الحقوق في الأعلى */
        .top-brand {
            position: absolute; top: 35px; right: 50px; font-size: 10px;
            font-weight: 900; color: rgba(0,0,0,0.5); text-transform: uppercase;
            letter-spacing: 3px; border-right: 4px solid var(--color-mid); padding-right: 12px;
        }

        /* الشريط الجانبي */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 90px; height: 100vh;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(30px);
            display: flex; flex-direction: column; align-items: center; padding-top: 40px; 
            z-index: 100; border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* إصلاح الحقول والنص التلقائي */
        .input-wrapper {
            background: #f3f4f6; border: 2px solid #000; border-radius: 20px;
            padding: 18px; margin-bottom: 20px; text-align: right; position: relative;
        }
        .field-editable:empty:before { content: attr(data-placeholder); color: #aaa; pointer-events: none; }
        .field-editable:focus { outline: none; }

        /* روابط المنصات */
        .link-item {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px;
        }
        .link-item:hover { transform: scale(1.04) translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* الفوتر الكامل */
        footer {
            background: rgba(0, 0, 0, 0.98); width: 100%; padding: 100px 20px; 
            margin-top: 100px; border-top: 1px solid rgba(255,255,255,0.1);
        }

        .platform-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            gap: 25px; max-width: 1000px; margin: 40px auto; padding: 40px;
            background: rgba(255,255,255,0.02); border-radius: 40px;
        }

        .icon-hover {
            font-size: 2rem; color: #fff; opacity: 0.3; transition: 0.4s; cursor: pointer;
        }
        .icon-hover:hover { opacity: 1; transform: scale(1.3) rotate(10deg); color: var(--color-light); }
        /* Global responsive fixes - Prevent overflow */
        *, *::before, *::after { box-sizing: border-box; }
        html { overflow-x: hidden; }

        /* Mobile (<768px): Bottom nav sidebar, scaled layout, touch-friendly */
        @media (max-width: 767px) {
            body { padding-bottom: 80px; } /* Space for bottom nav */

            .sidebar {
                position: fixed; left: auto; bottom: 0; top: auto; right: 0;
                width: 100vw; height: 80px; padding: 15px 20px;
                flex-direction: row; justify-content: space-around; align-items: center;
                border-right: none; border-top: 1px solid rgba(255,255,255,0.1);
            }
            .sidebar > * { margin: 0 5px; } /* Space color pickers horizontally */

            .main-card {
                width: 100%; max-width: none;
                padding: 100px 20px 60px; border-radius: 40px;
                margin-top: 120px; margin-bottom: 100px;
            }
            .avatar-container {
                width: 120px !important; height: 120px !important;
                border-width: 8px; margin-top: -100px !important;
            }
            .top-brand { position: relative; top: auto; right: auto; left: 20px; font-size: 9px; padding-right: 0; border-right: none; border-bottom: 2px solid var(--color-mid); padding-bottom: 4px; display: inline-block; }
            
            .input-wrapper { padding: 15px; margin-bottom: 15px; }
            #editorUI .flex { 
                flex-direction: column; gap: 15px; 
            }
            #editorUI input { 
                padding: 18px; font-size: 16px; text-align: right; 
            }
            .link-item { 
                flex-direction: column; gap: 15px; align-items: stretch; padding: 25px 20px;
            }
            .link-item > div { justify-content: flex-start; flex-wrap: wrap; }
            .fa-trash-alt { align-self: flex-end; order: 2; }

            footer { padding: 60px 15px; }
            .platform-grid { 
                grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); 
                gap: 15px; padding: 25px; margin: 25px auto; 
            }
            .icon-hover { font-size: 1.5rem; }
            
            button { 
                padding: 20px; font-size: 16px; min-height: 52px; 
            }
            [data-tip]:hover::after { 
                bottom: auto; top: 110%; margin-top: 8px; font-size: 12px; padding: 10px 15px; 
            }
        }

        /* Tablet (768px - 1024px) */
        @media (min-width: 768px) and (max-width: 1024px) {
            .sidebar { width: 80px; padding-top: 30px; }
            .main-card { padding: 120px 35px 70px; max-width: 700px; }
            .platform-grid { grid-template-columns: repeat(8, 60px); gap: 20px; }
        }

        /* Desktop/Large (>1024px): Enhanced */
        @media (min-width: 1025px) {
            .main-card { padding: 160px 60px 100px; }
            .sidebar { width: 100px; padding-top: 50px; }
            .platform-grid { grid-template-columns: repeat(12, 70px); max-width: 1400px; gap: 30px; }
        }

    </style>

</head>
<body>

    <div class="color-base"></div>
    <div class="marble-overlay"></div>

    <div class="sidebar" id="sidebarMenu">
        <i class="fas fa-palette text-white text-3xl mb-12" data-tip="تغيير المظهر&#10;Change Appearance"></i>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110" style="background: #3b82f6;" onclick="applyTheme('#3b82f6')" data-tip="أزرق ملكي&#10;Royal Blue"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110" style="background: #ef4444;" onclick="applyTheme('#ef4444')" data-tip="أحمر ناري&#10;Fire Red"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110" style="background: #10b981;" onclick="applyTheme('#10b981')" data-tip="أخضر زمردي&#10;Emerald Green"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110" style="background: #f59e0b;" onclick="applyTheme('#f59e0b')" data-tip="برتقالي ذهبي&#10;Golden Orange"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110" style="background: #8b5cf6;" onclick="applyTheme('#8b5cf6')" data-tip="بنفسجي ساحر&#10;Magic Purple"></div>
        
        <label class="cursor-pointer mt-8" data-tip="اختر لونك الخاص&#10;Custom Color">
            <i class="fas fa-eye-dropper text-white text-3xl"></i>
            <input type="color" oninput="applyTheme(this.value)" class="hidden">
        </label>
    </div>

    <div class="main-card">
        <div class="top-brand">Developed by Hussien Ehab</div>
        
        <div class="avatar-container w-40 h-40 border-[10px] border-white rounded-full mx-auto -mt-40 overflow-hidden shadow-2xl bg-white cursor-pointer relative group" onclick="document.getElementById('imgIn').click()" data-tip="تحديث صورتك الشخصية&#10;Update Profile Photo">
            <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
            <input type="file" id="imgIn" hidden onchange="preview(this)">
        </div>

        <div class="mt-12">
            <div class="input-wrapper" data-tip="أدخل اسمك الكامل هنا&#10;Enter Your Full Name">
                <div id="uName" class="field-editable font-black text-2xl" contenteditable="true" data-placeholder="اسم المستخدم..." onblur="checkEmpty(this)"></div>
            </div>
            <div class="input-wrapper" data-tip="اكتب شيئاً مميزاً عنك&#10;Write something about yourself">
                <div id="uBio" class="field-editable text-sm leading-loose" contenteditable="true" data-placeholder="نبذة تعريفية قصيرة..." oninput="limitBio(this)" onblur="checkEmpty(this)"></div>
                <div id="charCount" class="text-[10px] text-gray-400 mt-3 font-mono">0/150</div>
            </div>
        </div>

        <div id="linksBox" class="mt-10"></div>

        <div id="editorUI" class="mt-10">
            <div class="flex gap-4">
                <div class="input-wrapper mb-0 flex-1 py-4 shadow-inner">
                    <input type="text" id="urlIn" class="bg-transparent outline-none w-full text-sm font-bold" placeholder="ألصق رابط الحساب هنا...">
                </div>
                <button onclick="add()" class="px-10 bg-blue-600 text-white rounded-2xl shadow-xl hover:bg-blue-700 transition-all transform active:scale-95" data-tip="إضافة الرابط للقائمة&#10;Add To List">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>
        </div>

        <button id="genBtn" onclick="save()" class="w-full mt-10 py-6 bg-blue-600 text-white rounded-full font-black shadow-2xl uppercase tracking-[3px] text-xs hover:bg-blue-700 transition-all" data-tip="حفظ ونشر صفحتك الشخصية&#10;Save & Publish Your Page">
            توليد واختصار الرابط <i class="fas fa-bolt ml-2"></i>
        </button>
    </div>

    <footer>
        <div class="text-center">
            <h2 class="text-white text-xl font-black mb-12 tracking-widest uppercase underline underline-offset-[12px] decoration-blue-500">Supported Platforms | 100+ المنصات</h2>
            
            <div class="platform-grid" id="platformsGrid"></div>

            <div class="flex justify-center gap-12 mt-20 mb-10">
                <a href="https://www.instagram.com/hussienofficialo" target="_blank" class="icon-hover" data-tip="حساب المطور - انستغرام&#10;Developer Instagram"><i class="fab fa-instagram"></i></a>
                <a href="mailto:hussienehabofficial@gmail.com" class="icon-hover" data-tip="تواصل عبر البريد&#10;Contact via Email"><i class="fas fa-envelope"></i></a>
                <a href="#" class="icon-hover" data-tip="الموقع الرسمي للمطور&#10;Official Website"><i class="fas fa-globe"></i></a>
            </div>

            <div class="mt-20 opacity-20 text-[9px] text-white tracking-[5px] uppercase">
                © 2026 Hussien Ehab - Global Bio Links | All Rights Reserved
            </div>
        </div>
    </footer>

<script>
    // قائمة الـ 100 منصة كاملة
    const extendedIcons = {
        'instagram': 'fab fa-instagram', 'facebook': 'fab fa-facebook', 'twitter': 'fab fa-twitter', 'x.com': 'fab fa-x-twitter',
        'youtube': 'fab fa-youtube', 'tiktok': 'fab fa-tiktok', 'linkedin': 'fab fa-linkedin', 'github': 'fab fa-github',
        'snapchat': 'fab fa-snapchat', 'whatsapp': 'fab fa-whatsapp', 'telegram': 'fab fa-telegram', 'pinterest': 'fab fa-pinterest',
        'spotify': 'fab fa-spotify', 'twitch': 'fab fa-twitch', 'discord': 'fab fa-discord', 'reddit': 'fab fa-reddit',
        'medium': 'fab fa-medium', 'behance': 'fab fa-behance', 'dribbble': 'fab fa-dribbble', 'vimeo': 'fab fa-vimeo',
        'soundcloud': 'fab fa-soundcloud', 'steam': 'fab fa-steam', 'apple': 'fab fa-apple', 'google': 'fab fa-google',
        'figma': 'fab fa-figma', 'slack': 'fab fa-slack', 'skype': 'fab fa-skype', 'tumblr': 'fab fa-tumblr',
        'viber': 'fab fa-viber', 'line': 'fab fa-line', 'flickr': 'fab fa-flickr', 'quora': 'fab fa-quora', 
        'dev': 'fab fa-dev', 'stack-overflow': 'fab fa-stack-overflow', 'trello': 'fab fa-trello', 'dropbox': 'fab fa-dropbox', 
        'kickstarter': 'fab fa-kickstarter', 'etsy': 'fab fa-etsy', 'ebay': 'fab fa-ebay', 'microsoft': 'fab fa-microsoft', 
        'android': 'fab fa-android', 'patreon': 'fab fa-patreon', 'wordpress': 'fab fa-wordpress', 'blogger': 'fab fa-blogger', 
        'mastodon': 'fab fa-mastodon', 'threads': 'fab fa-threads', 'gitlab': 'fab fa-gitlab', 'codepen': 'fab fa-codepen', 
        'airbnb': 'fab fa-airbnb', 'uber': 'fab fa-uber', 'shopify': 'fab fa-shopify', 'docker': 'fab fa-docker', 
        'python': 'fab fa-python', 'node': 'fab fa-node-js', 'js': 'fab fa-js', 'html5': 'fab fa-html5', 'css3': 'fab fa-css3', 
        'react': 'fab fa-react', 'vue': 'fab fa-vuejs', 'angular': 'fab fa-angular', 'php': 'fab fa-php', 'aws': 'fab fa-aws', 
        'amazon': 'fab fa-amazon', 'paypal': 'fab fa-paypal', 'stripe': 'fab fa-stripe', 'bitcoin': 'fab fa-bitcoin', 
        'ethereum': 'fab fa-ethereum', 'cloudflare': 'fab fa-cloudflare', 'digital-ocean': 'fab fa-digital-ocean',
        'laravel': 'fab fa-laravel', 'bootstrap': 'fab fa-bootstrap', 'sass': 'fab fa-sass', 'npm': 'fab fa-npm',
        'yarn': 'fab fa-yarn', 'ubuntu': 'fab fa-ubuntu', 'linux': 'fab fa-linux', 'windows': 'fab fa-windows',
        'playstation': 'fab fa-playstation', 'xbox': 'fab fa-xbox', 'unity': 'fab fa-unity', 'envato': 'fas fa-leaf',
        'wix': 'fab fa-wix', 'zoom': 'fas fa-video', 'asana': 'fas fa-tasks',
        'bitbucket': 'fab fa-bitbucket', 'itunes': 'fab fa-itunes', 'app-store': 'fab fa-app-store', 'google-play': 'fab fa-google-play', 
        'chrome': 'fab fa-chrome', 'firefox': 'fab fa-firefox', 'edge': 'fab fa-edge', 'safari': 'fab fa-safari', 'opera': 'fab fa-opera',
        'messenger': 'fab fa-facebook-messenger',
'kick': 'fas fa-bolt',
'telenum': 'fas fa-phone-square-alt'
    };

    const grid = document.getElementById('platformsGrid');
    Object.entries(extendedIcons).forEach(([name, icon]) => {
        const i = document.createElement('i');
        i.className = `${icon} icon-hover`;
        i.setAttribute('data-tip', name.charAt(0).toUpperCase() + name.slice(1));
        grid.appendChild(i);
    });

    let links = [];

    function checkEmpty(el) { if (el.innerText.trim() === "") el.innerHTML = ""; }

    function applyTheme(hex) {
        document.documentElement.style.setProperty('--color-mid', hex);
        document.documentElement.style.setProperty('--color-light', hex + 'cc');
        document.documentElement.style.setProperty('--color-dark', '#000000');
    }

    function limitBio(el) {
        if(el.innerText.length > 150) el.innerText = el.innerText.substring(0, 150);
        document.getElementById('charCount').innerText = el.innerText.length + '/150';
    }

    function add() {
        const urlIn = document.getElementById('urlIn');
        const v = urlIn.value.trim();
        if(!v) return;
        let iconHtml = '';
        try {
            const url = new URL(v.startsWith('http') ? v : 'https://' + v);
            const host = url.hostname.toLowerCase().replace('www.', '');
            const key = Object.keys(extendedIcons).find(k => host.includes(k));
            iconHtml = key ? `<i class="${extendedIcons[key]} text-gray-600 text-2xl ml-4"></i>` : `<i class="fas fa-link text-gray-600 text-2xl ml-4"></i>`;
        } catch(e) { iconHtml = `<i class="fas fa-link text-gray-600 text-2xl ml-4"></i>`; }
        links.push({url: v, icon: iconHtml});
        draw();
        urlIn.value = '';
    }

    function draw() {
        const box = document.getElementById('linksBox');
        box.innerHTML = '';
        links.forEach((l, i) => {
            box.innerHTML += `
            <div class="link-item flex items-center justify-between p-6 shadow-sm" data-tip="افتح الرابط&#10;Open Link">
                <div class="flex items-center cursor-pointer flex-1" onclick="window.open('${l.url.startsWith('http') ? l.url : 'https://'+l.url}', '_blank')">
                    ${l.icon} <span class="font-bold text-gray-800 text-sm truncate" style="direction: ltr;">${l.url}</span>
                </div>
                <i class="fas fa-trash-alt text-red-400 cursor-pointer p-2 hover:text-red-700 transition" onclick="links.splice(${i},1); draw();" data-tip="حذف الرابط&#10;Delete Link"></i>
            </div>`;
        });
    }
async function shortenWithIsGd(longUrl) {
    try {
        // نرسل الرابط للموقع ونطلب النتيجة بصيغة JSON
        const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
        
        const data = await response.json();

        if (data.shorturl) {
            console.log("الرابط المختصر بنجاح:", data.shorturl);
            return data.shorturl;
        } else {
            console.error("خطأ من الموقع:", data.errormessage);
        }
    } catch (error) {
        console.error("فشل الاتصال بالـ API:", error);
    }
}

// مثال للاستخدام:
// shortenWithIsGd("https://your-very-long-website-link.com/profile/123");
    function preview(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = (e) => document.getElementById('pImg').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }
    }

 
    // 3. تحويل البيانات لرابط مشفر (Base64)
    const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const longUrl = window.location.origin + window.location.pathname + "?v=" + str;

 
   function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 25 + 's';
                particle.style.animationDuration = (20 + Math.random() * 15) + 's';
                container.appendChild(particle);
            }
        }

        function updateParticleColors() {
            const particles = document.querySelectorAll('.particle');
            const lightColor = getComputedStyle(document.documentElement).getPropertyValue('--color-light');
            particles.forEach(p => {
                p.style.background = `radial-gradient(circle at 30% 30%, ${lightColor} 0%, transparent 70%)`;
                p.style.boxShadow = `0 0 20px ${lightColor}`;
            });
        }



    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if(p.has('v')) {
            const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
            document.getElementById('uName').innerText = d.n;
            document.getElementById('uBio').innerText = d.b;
            document.getElementById('pImg').src = d.img;
            links = d.l; applyTheme(d.c); draw();
            document.getElementById('editorUI').style.display = 'none';
            document.getElementById('genBtn').style.display = 'none';
            document.getElementById('sidebarMenu').style.display = 'none';
            document.getElementById('uName').contentEditable = false;
            document.getElementById('uBio').contentEditable = false;
            setTimeout(() => { document.querySelectorAll('.fa-trash-alt').forEach(i => i.style.display = 'none'); }, 300);
        }
    };
        // Sync particles on theme change
        document.addEventListener('input', function (e) {
            if (e.target.type === 'color') {
                setTimeout(updateParticleColors, 50);
            }
        });

</script>
</body>
</html>
