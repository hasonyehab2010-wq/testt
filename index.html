 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Links Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --color-mid: #3b82f6; --color-dark: #050a14; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background-color: #000; overflow: hidden; }

        /* إعادة الخلفية الرخامية والنثر */
        .color-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--color-mid), var(--color-dark), var(--color-mid)); background-size: 400% 400%; animation: flow 10s ease infinite; z-index: -2; }
        .marble-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/black-marble.png'); opacity: 0.4; z-index: -1; }
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* الشريط الجانبي */
        .sidebar { position: fixed; left: 0; top: 0; width: 70px; height: 100vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; padding-top: 40px; z-index: 100; border-right: 1px solid rgba(255,255,255,0.1); }
        .side-dot { width: 35px; height: 35px; border-radius: 50%; margin-bottom: 15px; cursor: pointer; border: 2px solid white; transition: 0.3s; }

        .expanded-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(30px); border-radius: 50px; padding: 60px 45px; width: 95%; max-width: 530px; text-align: center; z-index: 10; box-shadow: 0 50px 100px rgba(0,0,0,0.4); position: relative; }
        
        .avatar-main { width: 135px; height: 135px; border-radius: 50%; border: 8px solid white; background: #fff; overflow: hidden; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.15); margin: -120px auto 30px; position: relative; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.9); padding: 15px 0; color: white; text-align: center; z-index: 50; }
    </style>
</head>
<body>

    <div class="color-base" id="themeLayer"></div>
    <div class="marble-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="side-dot" style="background: #3b82f6;" onclick="updateTheme('#3b82f6')"></div>
        <div class="side-dot" style="background: #df0505;" onclick="updateTheme('#df0505')"></div>
        <div class="side-dot" style="background: #10b981;" onclick="updateTheme('#10b981')"></div>
        <div class="side-dot" style="background: #a855f7;" onclick="updateTheme('#a855f7')"></div>
        <div class="side-dot" style="background: #f59e0b;" onclick="updateTheme('#f59e0b')"></div>
        <div class="side-dot" style="background: #ec4899;" onclick="updateTheme('#ec4899')"></div>
    </div>

    <div class="expanded-card">
        <div class="avatar-main" id="avatarBox" onclick="document.getElementById('fileIn').click()">
            <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
            <input type="file" id="fileIn" hidden onchange="loadImg(this)" accept="image/*">
        </div>

        <h1 id="uName" contenteditable="true" class="text-3xl font-black mb-2 text-gray-800 outline-none">إسم المستخدم</h1>
        <p id="uBio" contenteditable="true" class="text-gray-400 text-base mb-10 outline-none">أضف نبذتك الشخصية هنا...</p>

        <div id="linksContainer" class="space-y-4 mb-10 text-right"></div>

        <div id="editorUI" class="flex gap-3 mb-6">
            <input type="text" id="linkIn" class="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm border border-gray-200" placeholder="أدخل الرابط...">
            <button onclick="addL()" class="p-5 bg-white rounded-3xl shadow-md text-blue-600 hover:bg-blue-50"><i class="fas fa-plus"></i></button>
        </div>

        <button id="genBtn" onclick="generateFinalLink()" class="w-full py-5 bg-white text-blue-700 rounded-full font-black shadow-xl uppercase text-[11px] tracking-[5px] border border-blue-50">
            توليد الرابط النهائي <i class="fas fa-magic ml-2"></i>
        </button>
    </div>

    <footer>
        <p class="text-[9px] opacity-30 uppercase tracking-widest">© 2026 جميع الحقوق محفوظة - تصميمك الخاص</p>
    </footer>

    <script>
        let list = [];

        function updateTheme(hex) {
            document.documentElement.style.setProperty('--color-mid', hex);
            // حساب اللون الداكن تلقائياً
            let r = parseInt(hex.slice(1,3), 16)*0.2, g = parseInt(hex.slice(3,5), 16)*0.2, b = parseInt(hex.slice(5,7), 16)*0.2;
            document.documentElement.style.setProperty('--color-dark', `rgb(${r},${g},${b})`);
        }

        function loadImg(i) {
            const r = new FileReader();
            r.onload = (e) => document.getElementById('pImg').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function addL() {
            const v = document.getElementById('linkIn').value;
            if(v) { list.push(v); draw(); document.getElementById('linkIn').value = ''; }
        }

        function getIcon(url) {
            const u = url.toLowerCase();
            if(u.includes('instagram')) return 'fab fa-instagram';
            if(u.includes('twitter') || u.includes('x.com')) return 'fab fa-x-twitter';
            if(u.includes('facebook')) return 'fab fa-facebook';
            if(u.includes('linkedin')) return 'fab fa-linkedin';
            return 'fas fa-link';
        }

        function draw() {
            const c = document.getElementById('linksContainer');
            const isView = new URLSearchParams(window.location.search).has('v');
            c.innerHTML = '';
            list.forEach((l, i) => {
                c.innerHTML += `
                <div class="bg-gray-50 p-6 rounded-3xl flex justify-between items-center border border-gray-100 shadow-sm cursor-pointer" onclick="window.open('${l.includes('http')?l:'https://'+l}', '_blank')">
                    <div class="flex items-center gap-4">
                        <i class="${getIcon(l)} text-2xl text-blue-600"></i>
                        <span class="font-bold text-gray-700">${l}</span>
                    </div>
                    ${!isView ? `<i class="fas fa-trash-can text-red-300" onclick="event.stopPropagation(); list.splice(${i},1); draw()"></i>` : ''}
                </div>`;
            });
        }

        async function generateFinalLink() {
            const img = document.getElementById('pImg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 150; canvas.height = 150; // الضغط المطلوب
            ctx.drawImage(img, 0, 0, 150, 150);
            
            // جودة 0.2 لجعل الرابط أقصر ما يمكن للشبكات الاجتماعية
            const compressedImg = canvas.toDataURL('image/jpeg', 0.2);

            const data = { n: document.getElementById('uName').innerText, b: document.getElementById('uBio').innerText, l: list, c: document.documentElement.style.getPropertyValue('--color-mid'), img: compressedImg };
            const s = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const url = window.location.origin + window.location.pathname + "?v=" + s;

            await navigator.clipboard.writeText(url);
            alert("تم النسخ! إذا كان الرابط طويلاً على إنستغرام، استخدم موقع Bitly لاختصاره.");
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('v')) {
                const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                document.getElementById('uName').innerText = d.n;
                document.getElementById('uBio').innerText = d.b;
                document.getElementById('pImg').src = d.img;
                list = d.l; updateTheme(d.c || '#3b82f6'); draw();
                
                // القفل
                ["uName", "uBio"].forEach(id => document.getElementById(id).contentEditable = false);
                ["sidebar", "editorUI", "genBtn", "avatarBox"].forEach(id => document.getElementById(id).style.display = 'none');
            }
        }
    </script>
</body>
</html>
