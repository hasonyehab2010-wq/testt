<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Links Elite | 4K Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-mid: #3b82f6;
            --color-dark: #0f172a;
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; overflow: hidden;
        }

        /* الطبقات الخلفية: اللون + الرخام */
        .color-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--color-mid), var(--color-dark), var(--color-mid));
            background-size: 400% 400%;
            animation: flow 10s ease infinite;
            z-index: -2;
        }

        .marble-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img.jpg/background img.jpg');
            background-size: cover; background-position: center;
            mix-blend-mode: multiply;
            z-index: -1;
            filter: contrast(1.2) brightness(1.1);
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الجانب الأيسر: الألوان فقط */
        .sidebar {
            position: fixed; left: 0; top: 0;
            width: 70px; height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 40px; z-index: 100;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .side-dot {
            width: 35px; height: 35px; border-radius: 50%;
            margin-bottom: 15px; cursor: pointer;
            border: 2px solid white; transition: 0.3s;
        }

        /* البطاقة الوسطى الكبيرة */
        .expanded-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(30px);
            border-radius: 50px; 
            padding: 60px 45px;
            width: 95%; max-width: 520px;
            text-align: center; z-index: 10;
            box-shadow: 0 50px 100px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
        }

        /* صورة البروفايل والإرشاد */
        .profile-section {
            position: relative;
            margin: -115px auto 30px;
            display: inline-block;
        }

        .avatar-main {
            width: 130px; height: 130px;
            border-radius: 50%; border: 8px solid white;
            background: #fff; overflow: hidden;
            cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .upload-hint {
            position: absolute; right: -130px; top: 50%;
            transform: translateY(-50%);
            background: #333; color: #fff;
            padding: 5px 12px; border-radius: 20px;
            font-size: 10px; font-weight: bold; white-space: nowrap;
        }
        .upload-hint::before {
            content: ''; position: absolute; left: -5px; top: 50%;
            transform: translateY(-50%);
            border-top: 5px solid transparent; border-bottom: 5px solid transparent;
            border-right: 5px solid #333;
        }

        /* الفوتر النحيف */
        footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.85); 
            padding: 12px 0;
            color: white; text-align: center; z-index: 50;
        }
        .footer-icons i { font-size: 22px; margin: 0 15px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="color-base" id="themeLayer"></div>
    <div class="marble-overlay"></div>

    <div class="sidebar">
        <div class="side-dot" style="background: #3b82f6;" onclick="updateTheme('#3b82f6')"></div>
        <div class="side-dot" style="background: #8e44ad;" onclick="updateTheme('#8e44ad')"></div>
        <div class="side-dot" style="background: #27ae60;" onclick="updateTheme('#27ae60')"></div>
        <div class="side-dot" style="background: #e74c3c;" onclick="updateTheme('#e74c3c')"></div>
        <label class="w-9 h-9 bg-white rounded-full flex items-center justify-center cursor-pointer border border-gray-400">
            <i class="fas fa-palette text-gray-700 text-sm"></i>
            <input type="color" oninput="updateTheme(this.value)" class="hidden">
        </label>
    </div>

    <div class="expanded-card">
        <div class="profile-section">
            <div class="avatar-main" onclick="document.getElementById('fileIn').click()">
                <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                <input type="file" id="fileIn" hidden onchange="loadImg(this)">
            </div>
            <div id="hint" class="upload-hint">إضغط لتحديد صورة بروفايل</div>
        </div>

        <h1 id="uName" contenteditable="true" class="text-4xl font-black mb-2 text-gray-800 outline-none">إسم المستخدم</h1>
        <p id="uBio" contenteditable="true" class="text-gray-400 text-base mb-12 outline-none">أضف تفاصيلك وروابطك هنا...</p>

        <div id="linksContainer" class="space-y-4 mb-10"></div>

        <div class="flex gap-3 mb-6">
            <input type="text" id="linkIn" class="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm border border-gray-200" placeholder="أدخل رابطك الجديد...">
            <button onclick="addL()" class="p-5 bg-white rounded-3xl shadow-md text-blue-600"><i class="fas fa-plus"></i></button>
        </div>

        <button onclick="generateFinalLink()" class="w-full py-5 bg-white text-blue-700 rounded-full font-black shadow-xl uppercase text-[11px] tracking-[5px] border border-blue-100 hover:scale-[1.02] transition-all">
            توليد الرابط النهائي <i class="fas fa-magic ml-2"></i>
        </button>
    </div>

    <footer>
        <div class="flex justify-center mb-1 footer-icons">
            <i class="fab fa-instagram"></i>
            <i class="fas fa-envelope"></i>
            <i class="fab fa-x-twitter"></i>
        </div>
        <p class="text-[8px] opacity-30 uppercase tracking-widest">© 2026 جميع الحقوق محفوظة</p>
    </footer>

    <script>
        let list = [];

        // تحديث الألوان بذكاء (متوسط إلى داكن)
        function updateTheme(hex) {
            const mid = hex;
            let r = parseInt(mid.slice(1,3), 16), g = parseInt(mid.slice(3,5), 16), b = parseInt(mid.slice(5,7), 16);
            const dark = `rgb(${r*0.2}, ${g*0.2}, ${b*0.2})`;
            document.documentElement.style.setProperty('--color-mid', mid);
            document.documentElement.style.setProperty('--color-dark', dark);
        }

        function loadImg(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => document.getElementById('pImg').src = e.target.result;
                r.readAsDataURL(i.files[0]);
            }
        }

        function addL() {
            const v = document.getElementById('linkIn').value;
            if(!v) return;
            list.push(v);
            draw();
            document.getElementById('linkIn').value = '';
        }

        function draw() {
            const c = document.getElementById('linksContainer');
            c.innerHTML = '';
            list.forEach((l, i) => {
                c.innerHTML += `<div class="bg-gray-50/70 p-5 rounded-3xl flex justify-between items-center text-sm border border-gray-100 shadow-sm">
                    <span class="font-bold text-gray-700 truncate w-64 text-left">${l}</span>
                    <i class="fas fa-trash text-red-300 cursor-pointer" onclick="list.splice(${i},1);draw()"></i>
                </div>`;
            });
        }

        // --- محرك الضغط وتوليد الرابط القصير ---
        function generateFinalLink() {
            const img = document.getElementById('pImg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // ضغط الصورة لـ 150 بكسل فقط لتقصير الرابط
            canvas.width = 150; canvas.height = 150;
            ctx.drawImage(img, 0, 0, 150, 150);
            const compressedImg = canvas.toDataURL('image/jpeg', 0.6);

            const data = {
                n: document.getElementById('uName').innerText,
                b: document.getElementById('uBio').innerText,
                l: list,
                c: document.documentElement.style.getPropertyValue('--color-mid') || '#3b82f6',
                img: compressedImg
            };

            const s = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const url = window.location.href.split('?')[0] + "?v=" + s;

            if(url.length > 2000) {
                alert("⚠️ الرابط طويل جداً، حاول تقليل الروابط.");
            } else {
                navigator.clipboard.writeText(url);
                alert("🚀 تم نسخ الرابط القصير بنجاح!");
            }
        }

        // --- القراءة الذكية عند التحميل ---
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('v')) {
                const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                document.getElementById('uName').innerText = d.n;
                document.getElementById('uBio').innerText = d.b;
                document.getElementById('pImg').src = d.img;
                list = d.l;
                updateTheme(d.c);
                draw();
                // إخفاء أدوات التعديل
                document.querySelector('.sidebar').style.display = 'none';
                document.querySelector('.flex').style.display = 'none';
                document.getElementById('hint').style.display = 'none';
                document.querySelector('button[onclick="generateFinalLink()"]').style.display = 'none';
                document.querySelectorAll('.fa-trash').forEach(e => e.style.display = 'none');
            }
        }
    </script>
</body>
</html>
