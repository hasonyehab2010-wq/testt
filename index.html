 <!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bio-Links | Hussien Ehab Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --color-light: #60a5fa;
            --color-mid: #3b82f6;
            --color-dark: #1e3a8a;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1d1d1d;
            overflow-x: hidden;
        }

        /* خلفية الألوان والرخام المتحرك */
        .color-base {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, var(--color-light), var(--color-mid), var(--color-dark), var(--color-mid), var(--color-light));
            background-size: 400% 400%;
            animation: rgbFlow 12s linear infinite;
            z-index: -2;
            opacity: 0.9;
        }

        .marble-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('img.jpg/backgroundimg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0.5;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        @keyframes rgbFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* نظام الـ Tooltip الاحترافي الذي أعجبك */
        [data-tip] {
            position: relative;
        }

        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 11px;
            white-space: pre-wrap;
            text-align: center;
            z-index: 1000;
            border: 1px solid var(--color-light);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            line-height: 1.6;
            pointer-events: none;
            animation: fadeInScale 0.3s ease;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }

        /* الكارت الرئيسي بتنسيق فخم */
        .main-card {
            position: relative;
            background: #b4b4b4;
            border-radius: 60px;
            padding: 140px 45px 80px 45px;
            width: 95%;
            max-width: 580px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 60px 150px rgba(0, 0, 0, 0.8);
            margin-top: 80px;
            margin-bottom: 80px;
        }

        /* الحقوق في الأعلى */
        .top-brand {
            position: absolute;
            top: 35px;
            right: 50px;
            font-size: 10px;
            font-weight: 900;
            color: rgba(141, 141, 141, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            border-right: 4px solid var(--color-mid);
            padding-right: 12px;
        }

        /* الشريط الجانبي */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 90px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 100;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* إصلاح الحقول والنص التلقائي */
        .input-wrapper {
            background: #f3f4f6;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: right;
            position: relative;
        }

        .field-editable:empty:before {
            content: attr(data-placeholder);
            color: #aaa;
            pointer-events: none;
        }

        .field-editable:focus {
            outline: none;
        }

        /* روابط المنصات */
        .link-item {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
        }

        .link-item:hover {
            transform: scale(1.04) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* الفوتر الكامل */
        footer {
            /* تم تعديل الشفافية لتكون 85% مع الحفاظ على درجة السواد الفخمة */
            background: rgba(0, 0, 0, 0.85);

            /* إضافة تأثير الزجاج الضبابي لرؤية النثرات (Particles) بشكل ساحر خلف الفوتر */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            width: 100%;
            padding: 100px 20px;
            margin-top: 100px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            /* لضمان توسيط العناصر بداخله */
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0;
            padding: 0;
            border-radius: 0;
        }

        .icon-hover {
            font-size: 2rem;
            color: #fff;
            opacity: 0.3;
            transition: 0.4s;
            cursor: pointer;
        }

        .icon-hover:hover {
            opacity: 1;
            transform: scale(1.3) rotate(10deg);
            color: var(--color-light);
        }

        /* New Footer Architecture & Particles */
        .footer-header {
            /* 1. المحاذاة لليسار */
            text-align: left;

            /* 2. التحكم في الدفع لليسار (قلل هذا الرقم ليدخل لليسار أكثر) */
            /* إذا جعلته 0 سيلتصق تماماً بالحافة اليسرى */
            margin-left: 1px;

            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            width: fit-content;
        }

        .footer-header::after {
            content: '';
            position: absolute;
            bottom: -10px;

            /* 3. بقاء الخط ملتصقاً ببداية النص من اليسار */
            left: 0;
            transform: none;

            width: 80px;
            height: 4px;
            background: linear-gradient(to right, var(--color-light), var(--color-mid));
            border-radius: 2px;
        }

        .social-dev-box {
            /* --- أوامر التحريك الشامل (للبوكس وما بداخله) --- */
            position: absolute;
            /* تجعل البوكس يطفو ويتحرك بحرية */
            top: 30px;
            /* المسافة من أعلى الصفحة */
            right: 530px;
            /* المسافة من جهة اليمين */
            margin: 0;
            /* إلغاء التوسيط التلقائي لضمان الثبات يميناً */
            z-index: 999;
            /* لضمان ظهوره فوق أي طبقات أخرى */

            /* --- خصائص التصميم الأصلية الخاصة بك --- */
            background: rgba(128, 128, 128, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .platforms-container {
            /* --- أوامر الإجبار للعودة للمنتصف --- */
            position: relative !important;
            /* !important تجبر المتصفح على إلغاء أي أمر سابق */
            top: auto !important;
            right: auto !important;
            left: auto !important;
            margin: 40px auto !important;
            /* التمركز التلقائي في المنتصف مع هامش علوي */
            display: block !important;
            clear: both;

            /* --- خصائصك الجمالية الأصلية --- */
            background: rgba(211, 211, 211, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            max-width: 600px;
            /* قمت بتصغيره قليلاً ليتناسب مع البطاقة */
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            z-index: 5;
            width: 95%;
            max-width: 1100px;
            /* يمكنك زيادة هذا الرقم لتعريضه أكثر */

            /* 2. توزيع الأيقونات بتناسق آلي (المسافات بينها ستكون متساوية تماماً) */
            display: flex;
            justify-content: space-around;
            /* هذا السطر يوزع الأيقونات بمسافات متساوية وتلقائية */
            align-items: center;

            /* 3. الحشو الجانبي لضمان عدم التصاق الأيقونات بالأطراف */
            padding: 30px 80px;
        }

        .portfolio-box {

            background: rgba(128, 128, 128, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 30px;
            padding: 30px;
            margin: 100px auto 30px auto;
            max-width: 500px;
            text-align: center;

            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        }

        .portfolio-box:hover {

            transform: translateY(-8px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);

        }

        .portfolio-box:active {
            transform: translateY(-4px) scale(0.98);
        }

        .portfolio-link {
            display: inline-block;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
            padding: 12px 24px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.4);
            margin-right: 12px;
        }

        .portfolio-link::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--color-light);
            transition: all 0.1s ease;
            transform: translateX(-50%);
        }

        .portfolio-link:hover::after,
        .portfolio-link:active::after {
            width: 90%;
        }

        .ext-icon {
            margin-right: 12px;
            color: var(--color-light);
            font-size: 1.2rem;
            transition: 0.1s;
        }

        .portfolio-link:hover .ext-icon {
            transform: scale(1.4) rotate(5deg);
        }

        .legal-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(119, 6, 6, 0.25);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 18px 50px;
            margin: 0;
            max-width: 600px;
            font-size: 0.95rem;
            font-weight: 800;
            text-align: center;
            color: #c0c0c0;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Particles Engine */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--color-light) 0%, transparent 70%);
            box-shadow: 0 0 20px var(--color-light);
            opacity: 0.7;
            animation: particleFloat 25s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="color-base"></div>
    <div class="marble-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="sidebar" id="sidebarMenu">
        <i class="fas fa-palette text-white text-3xl mb-12" data-tip="تغيير المظهر&#10;Change Appearance"></i>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110"
            style="background: #3b82f6;" onclick="applyTheme('#3b82f6')" data-tip="أزرق ملكي&#10;Royal Blue"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110"
            style="background: #ef4444;" onclick="applyTheme('#ef4444')" data-tip="أحمر ناري&#10;Fire Red"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110"
            style="background: #10b981;" onclick="applyTheme('#10b981')" data-tip="أخضر زمردي&#10;Emerald Green"></div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110"
            style="background: #f59e0b;" onclick="applyTheme('#f59e0b')" data-tip="برتقالي ذهبي&#10;Golden Orange">
        </div>
        <div class="w-10 h-10 rounded-full mb-6 border-2 border-white cursor-pointer hover:scale-110"
            style="background: #8b5cf6;" onclick="applyTheme('#8b5cf6')" data-tip="بنفسجي ساحر&#10;Magic Purple"></div>

        <label class="cursor-pointer mt-8" data-tip="اختر لونك الخاص&#10;Custom Color">
            <i class="fas fa-eye-dropper text-white text-3xl"></i>
            <input type="color" oninput="applyTheme(this.value)" class="hidden">
        </label>
    </div>

    <div class="main-card">
        <div class="top-brand">Developed by Hussien Ehab</div>

        <div class="avatar-container w-40 h-40 border-[10px] border-white rounded-full mx-auto -mt-40 overflow-hidden shadow-2xl bg-white cursor-pointer relative group"
            onclick="document.getElementById('imgIn').click()" data-tip="تحديث صورتك الشخصية&#10;Update Profile Photo">
            <img id="pImg" src="https://via.placeholder.com/150"
                class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
            <input type="file" id="imgIn" hidden onchange="preview(this)">
        </div>

        <div class="mt-12">
            <div class="input-wrapper" data-tip="أدخل اسمك الكامل هنا&#10;Enter Your Full Name">
                <div id="uName" class="field-editable font-black text-2xl" contenteditable="true"
                    data-placeholder="اسم المستخدم..." onblur="checkEmpty(this)"></div>
            </div>
            <div class="input-wrapper" data-tip="اكتب شيئاً مميزاً عنك&#10;Write something about yourself">
                <div id="uBio" class="field-editable text-sm leading-loose" contenteditable="true"
                    data-placeholder="نبذة تعريفية قصيرة..." oninput="limitBio(this)" onblur="checkEmpty(this)"></div>
                <div id="charCount" class="text-[10px] text-gray-400 mt-3 font-mono">0/150</div>
            </div>
        </div>

        <div id="linksBox" class="mt-10"></div>

        <div id="editorUI" class="mt-10">
            <div class="flex gap-4">
                <div class="input-wrapper mb-0 flex-1 py-4 shadow-inner">
                    <input type="text" id="urlIn" class="bg-transparent outline-none w-full text-sm font-bold"
                        placeholder="ألصق رابط الحساب هنا...">
                </div>
                <button onclick="add()"
                    class="px-10 bg-blue-600 text-white rounded-2xl shadow-xl hover:bg-blue-700 transition-all transform active:scale-95"
                    data-tip="إضافة الرابط للقائمة&#10;Add To List">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>
        </div>

        <button id="genBtn" onclick="save()"
            class="w-full mt-10 py-6 bg-blue-600 text-white rounded-full font-black shadow-2xl uppercase tracking-[3px] text-xs hover:bg-blue-700 transition-all"
            data-tip="حفظ ونشر صفحتك الشخصية&#10;Save & Publish Your Page">
            توليد واختصار الرابط <i class="fas fa-bolt ml-2"></i>
        </button>
    </div>

    <footer>
        <div class="text-center">
            <div class="footer-header" data-tip="CONTACT">CONTACT US | تواصل معنا : >>>>></div>

            <h2
                class="text-white text-xl font-black mb-12 tracking-widest uppercase underline underline-offset-[12px] decoration-blue-500">
                +Supported Platforms | 100 المنصات :</h2>

            <div class="platforms-container">
                <div class="platform-grid" id="platformsGrid"></div>
            </div>

            <div class="social-dev-box">
                <div class="flex justify-center gap-12">
                    <a href="https://www.instagram.com/hussienofficialo" target="_blank" class="icon-hover"
                        data-tip="حساب المطور - انستغرام&#10;Developer Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="mailto:hussienehabofficial@gmail.com" class="icon-hover"
                        data-tip="تواصل عبر البريد&#10;Contact via Email"><i class="fas fa-envelope"></i></a>
                    <a href="#" class="icon-hover" data-tip="الموقع الرسمي للمطور&#10;Official Website"><i
                            class="fas fa-globe"></i></a>
                </div>
            </div>

            <div class="portfolio-box" data-tip="**تم بواسطة الموقع Global Bio-Links | Hussien Ehab Edition**">
                <a href="#" class="portfolio-link" target="_blank">
                    <i class="fas fa-external-link-alt ext-icon"></i>Developer Portfolio
                </a>
            </div>

            <div class="mt-20 opacity-20 text-[9px] text-white tracking-[5px] uppercase">
                © 2026 Hussien Ehab - Global Bio Links | All Rights Reserved
            </div>
        </div>
    </footer>

    <div class="legal-bar">**© 2026 جميع الحقوق محفوظة | ALL RIGHTS RESERVED**</div>

    <script>
        // قائمة الـ 100 منصة كاملة
        const extendedIcons = {
            'instagram': 'fab fa-instagram', 'facebook': 'fab fa-facebook',  'x.com': 'fab fa-x-twitter',
            'youtube': 'fab fa-youtube', 'tiktok': 'fab fa-tiktok', 'linkedin': 'fab fa-linkedin', 'github': 'fab fa-github',
            'snapchat': 'fab fa-snapchat', 'whatsapp': 'fab fa-whatsapp', 'telegram': 'fab fa-telegram', 'pinterest': 'fab fa-pinterest',
            'spotify': 'fab fa-spotify', 'twitch': 'fab fa-twitch', 'discord': 'fab fa-discord', 'reddit': 'fab fa-reddit',
            'medium': 'fab fa-medium', 'behance': 'fab fa-behance', 'dribbble': 'fab fa-dribbble', 'vimeo': 'fab fa-vimeo',
            'soundcloud': 'fab fa-soundcloud', 'steam': 'fab fa-steam', 'apple': 'fab fa-apple', 'google': 'fab fa-google',
            'figma': 'fab fa-figma', 'slack': 'fab fa-slack', 'skype': 'fab fa-skype', 'tumblr': 'fab fa-tumblr',
            'viber': 'fab fa-viber', 'line': 'fab fa-line', 'flickr': 'fab fa-flickr', 'quora': 'fab fa-quora',
            'dev': 'fab fa-dev', 'stack-overflow': 'fab fa-stack-overflow', 'trello': 'fab fa-trello', 'dropbox': 'fab fa-dropbox',
            'kickstarter': 'fab fa-kickstarter', 'etsy': 'fab fa-etsy', 'ebay': 'fab fa-ebay', 'microsoft': 'fab fa-microsoft',
            'android': 'fab fa-android', 'patreon': 'fab fa-patreon', 'wordpress': 'fab fa-wordpress', 'blogger': 'fab fa-blogger',
            'mastodon': 'fab fa-mastodon', 'threads': 'fab fa-threads', 'gitlab': 'fab fa-gitlab', 'codepen': 'fab fa-codepen',
            'airbnb': 'fab fa-airbnb', 'uber': 'fab fa-uber', 'shopify': 'fab fa-shopify', 'docker': 'fab fa-docker',
            'python': 'fab fa-python', 'node': 'fab fa-node-js', 'js': 'fab fa-js', 'html5': 'fab fa-html5', 'css3': 'fab fa-css3',
            'react': 'fab fa-react', 'vue': 'fab fa-vuejs', 'angular': 'fab fa-angular', 'php': 'fab fa-php', 'aws': 'fab fa-aws',
            'amazon': 'fab fa-amazon', 'paypal': 'fab fa-paypal', 'stripe': 'fab fa-stripe', 'bitcoin': 'fab fa-bitcoin',
            'ethereum': 'fab fa-ethereum', 'cloudflare': 'fab fa-cloudflare', 'digital-ocean': 'fab fa-digital-ocean',
            'laravel': 'fab fa-laravel', 'bootstrap': 'fab fa-bootstrap', 'sass': 'fab fa-sass', 'npm': 'fab fa-npm',
            'yarn': 'fab fa-yarn', 'ubuntu': 'fab fa-ubuntu', 'linux': 'fab fa-linux', 'windows': 'fab fa-windows',
            'playstation': 'fab fa-playstation', 'xbox': 'fab fa-xbox', 'unity': 'fab fa-unity', 'envato': 'fas fa-leaf',
            'wix': 'fab fa-wix', 'zoom': 'fas fa-video', 'asana': 'fas fa-tasks',
            'bitbucket': 'fab fa-bitbucket', 'itunes': 'fab fa-itunes', 'app-store': 'fab fa-app-store', 'google-play': 'fab fa-google-play',
            'chrome': 'fab fa-chrome', 'firefox': 'fab fa-firefox', 'edge': 'fab fa-edge', 'safari': 'fab fa-safari', 'opera': 'fab fa-opera',
            'whatsapp-business': 'fab fa-whatsapp',
'messenger': 'fab fa-facebook-messenger',
'kick': 'fas fa-bolt',
'telenum': 'fas fa-phone-square-alt'
        };

        const grid = document.getElementById('platformsGrid');
        Object.entries(extendedIcons).forEach(([name, icon]) => {
            const i = document.createElement('i');
            i.className = `${icon} icon-hover`;
            i.setAttribute('data-tip', name.charAt(0).toUpperCase() + name.slice(1));
            grid.appendChild(i);
        });

        let links = [];

        function checkEmpty(el) { if (el.innerText.trim() === "") el.innerHTML = ""; }

        function applyTheme(hex) {
            document.documentElement.style.setProperty('--color-mid', hex);
            document.documentElement.style.setProperty('--color-light', hex + 'cc');
            document.documentElement.style.setProperty('--color-dark', '#000000');
        }

        function limitBio(el) {
            if (el.innerText.length > 150) el.innerText = el.innerText.substring(0, 150);
            document.getElementById('charCount').innerText = el.innerText.length + '/150';
        }

        function add() {
            const urlIn = document.getElementById('urlIn');
            const v = urlIn.value.trim();
            if (!v) return;
            let iconHtml = '';
            try {
                const url = new URL(v.startsWith('http') ? v : 'https://' + v);
                const host = url.hostname.toLowerCase().replace('www.', '');
                // Smart parsing optimized - priority for common platforms
                const priority = ['youtube', 'instagram', 'tiktok', 'facebook', 'twitter', 'x.com', 'linkedin', 'github', 'snapchat', 'whatsapp'];
                let key = priority.find(k => host.includes(k)) || Object.keys(extendedIcons).find(k => host.includes(k));
                iconHtml = key ? `<i class="${extendedIcons[key]} text-gray-600 text-2xl ml-4"></i>` : `<i class="fas fa-link text-gray-600 text-2xl ml-4"></i>`;
            } catch (e) { iconHtml = `<i class="fas fa-link text-gray-600 text-2xl ml-4"></i>`; }
            links.push({ url: v, icon: iconHtml });
            draw();
            urlIn.value = '';
        }

        function draw() {
            const box = document.getElementById('linksBox');
            box.innerHTML = '';
            links.forEach((l, i) => {
                box.innerHTML += `
            <div class="link-item flex items-center justify-between p-6 shadow-sm" data-tip="افتح الرابط&#10;Open Link">
                <div class="flex items-center cursor-pointer flex-1" onclick="window.open('${l.url.startsWith('http') ? l.url : 'https://' + l.url}', '_blank')">
                    ${l.icon} <span class="font-bold text-gray-800 text-sm truncate" style="direction: ltr;">${l.url}</span>
                </div>
                <i class="fas fa-trash-alt text-red-400 cursor-pointer p-2 hover:text-red-700 transition" data-idx="${i}" data-tip="حذف الرابط&#10;Delete Link"></i>
            </div>`;
            });

            // Re-engineered removeLink - event delegation for reliable delete (fixes all issues)
            document.getElementById('linksBox').addEventListener('click', (e) => {
                if (e.target.classList.contains('fa-trash-alt')) {
                    const idx = parseInt(e.target.dataset.idx);
                    if (!isNaN(idx)) {
                        links.splice(idx, 1);
                        draw();
                    }
                }
            });
        };


        function preview(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => document.getElementById('pImg').src = e.target.result;
                r.readAsDataURL(i.files[0]);
            }
        }

        async function save() {
            const data = { n: document.getElementById('uName').innerText, b: document.getElementById('uBio').innerText, l: links, c: document.documentElement.style.getPropertyValue('--color-mid').trim() || '#3b82f6', img: document.getElementById('pImg').src };
            const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const longUrl = window.location.href.split('?')[0] + "?v=" + str;
            try {
                const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
                const shortUrl = await res.text();
                navigator.clipboard.writeText(shortUrl);
                alert("🚀 تم نسخ الرابط المختصر بنجاح!");
            } catch (e) {
                navigator.clipboard.writeText(longUrl);
                alert("🚀 تم نسخ الرابط الطويل!");
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 25 + 's';
                particle.style.animationDuration = (20 + Math.random() * 15) + 's';
                container.appendChild(particle);
            }
        }

        function updateParticleColors() {
            const particles = document.querySelectorAll('.particle');
            const lightColor = getComputedStyle(document.documentElement).getPropertyValue('--color-light');
            particles.forEach(p => {
                p.style.background = `radial-gradient(circle at 30% 30%, ${lightColor} 0%, transparent 70%)`;
                p.style.boxShadow = `0 0 20px ${lightColor}`;
            });
        }

        window.onload = () => {
            createParticles();
            updateParticleColors();
            const p = new URLSearchParams(window.location.search);
            if (p.has('v')) {
                const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                document.getElementById('uName').innerText = d.n;
                document.getElementById('uBio').innerText = d.b;
                document.getElementById('pImg').src = d.img;
                links = d.l; applyTheme(d.c); draw();
                document.getElementById('editorUI').style.display = 'none';
                document.getElementById('genBtn').style.display = 'none';
                document.getElementById('sidebarMenu').style.display = 'none';
                document.getElementById('uName').contentEditable = false;
                document.getElementById('uBio').contentEditable = false;
                setTimeout(() => { document.querySelectorAll('.fa-trash-alt').forEach(i => i.style.display = 'none'); }, 300);
            }
        };

        // Sync particles on theme change
        document.addEventListener('input', function (e) {
            if (e.target.type === 'color') {
                setTimeout(updateParticleColors, 50);
            }
        });
    </script>
</body>

</html>
