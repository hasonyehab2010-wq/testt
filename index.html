 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Links Elite | High Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --color-mid: #3b82f6; --color-dark: #0a0a0a; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background-color: #000; overflow: hidden; }

        /* الخلفية المحدثة لعدم طمس الألوان */
        .color-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--color-mid), #111, var(--color-mid)); background-size: 400% 400%; animation: flow 12s ease infinite; z-index: -2; }
        .marble-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('img.jpg/background img.jpg'); opacity: 0.3; z-index: -1; pointer-events: none; }
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* البطاقة - أبيض ناصع 100% */
        .expanded-card { background: #ffffff; border-radius: 50px; padding: 60px 45px; width: 95%; max-width: 530px; text-align: center; z-index: 10; box-shadow: 0 40px 80px rgba(0,0,0,0.5); position: relative; }
        
        .sidebar { position: fixed; left: 0; top: 0; width: 75px; height: 100vh; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; padding-top: 40px; z-index: 100; border-right: 1px solid rgba(255,255,255,0.1); }
        .side-dot { width: 38px; height: 38px; border-radius: 50%; margin-bottom: 18px; cursor: pointer; border: 3px solid #fff; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .side-dot:hover { transform: scale(1.1); }

        .avatar-main { width: 135px; height: 135px; border-radius: 50%; border: 6px solid #fff; background: #eee; overflow: hidden; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin: -125px auto 30px; position: relative; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.85); padding: 15px 0; color: white; text-align: center; z-index: 50; }
        .link-item { background: #f8fafc; transition: all 0.3s; border: 1px solid #edf2f7; }
        .link-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); background: #fff; }
    </style>
</head>
<body>

    <div class="color-base" id="themeLayer"></div>
    <div class="marble-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="side-dot" style="background: #3b82f6;" onclick="updateTheme('#3b82f6')"></div> <div class="side-dot" style="background: #ff0000;" onclick="updateTheme('#ff0000')"></div> <div class="side-dot" style="background: #00ff00;" onclick="updateTheme('#00ff00')"></div> <div class="side-dot" style="background: #ffff00;" onclick="updateTheme('#ffff00')"></div> <div class="side-dot" style="background: #ff00ff;" onclick="updateTheme('#ff00ff')"></div> <div class="side-dot" style="background: #ffffff;" onclick="updateTheme('#ffffff')"></div> </div>

    <div class="expanded-card">
        <div class="avatar-main" id="avatarBox" onclick="document.getElementById('fileIn').click()">
            <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
            <input type="file" id="fileIn" hidden onchange="loadImg(this)" accept="image/*">
        </div>

        <h1 id="uName" contenteditable="true" class="text-3xl font-black mb-2 text-gray-900 outline-none">إسم المستخدم</h1>
        <p id="uBio" contenteditable="true" class="text-gray-500 text-base mb-10 outline-none">أضف نبذتك الشخصية هنا...</p>

        <div id="linksContainer" class="space-y-4 mb-10 text-right"></div>

        <div id="editorUI" class="flex gap-3 mb-6">
            <input type="text" id="linkIn" class="w-full p-5 bg-gray-50 rounded-3xl outline-none text-sm border border-gray-200" placeholder="ضع الرابط هنا...">
            <button onclick="addL()" class="p-5 bg-white rounded-3xl shadow-md text-blue-600 hover:bg-blue-50"><i class="fas fa-plus"></i></button>
        </div>

        <button id="genBtn" onclick="generateFinalLink()" class="w-full py-5 bg-blue-600 text-white rounded-full font-black shadow-xl uppercase text-[11px] tracking-[5px] hover:bg-blue-700 transition-all">
            توليد الرابط النهائي <i class="fas fa-magic ml-2"></i>
        </button>
    </div>

    <footer>
        <p class="text-[10px] opacity-50 uppercase tracking-widest">© 2026 جميع الحقوق محفوظة - تصميم احترافي</p>
    </footer>

    <script>
        let list = [];

        function updateTheme(hex) {
            document.documentElement.style.setProperty('--color-mid', hex);
            // تحسين حساب اللون الداكن ليبقى مرئياً ولا يصبح أسوداً قاتماً
            document.documentElement.style.setProperty('--color-dark', '#000000');
        }

        function loadImg(i) {
            const r = new FileReader();
            r.onload = (e) => document.getElementById('pImg').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function addL() {
            const v = document.getElementById('linkIn').value;
            if(v) { list.push(v); draw(); document.getElementById('linkIn').value = ''; }
        }

        function getIcon(url) {
            const u = url.toLowerCase();
            if(u.includes('instagram')) return 'fab fa-instagram';
            if(u.includes('twitter') || u.includes('x.com')) return 'fab fa-x-twitter';
            if(u.includes('facebook')) return 'fab fa-facebook';
            if(u.includes('linkedin')) return 'fab fa-linkedin';
            if(u.includes('youtube')) return 'fab fa-youtube';
            return 'fas fa-link';
        }

        function draw() {
            const c = document.getElementById('linksContainer');
            const isView = new URLSearchParams(window.location.search).has('v');
            c.innerHTML = '';
            list.forEach((l, i) => {
                const finalUrl = l.includes('http') ? l : 'https://' + l;
                c.innerHTML += `
                <div class="link-item p-6 rounded-3xl flex justify-between items-center cursor-pointer" onclick="window.open('${finalUrl}', '_blank')">
                    <div class="flex items-center gap-4">
                        <i class="${getIcon(l)} text-2xl text-blue-600"></i>
                        <span class="font-bold text-gray-800">${l}</span>
                    </div>
                    ${!isView ? `<i class="fas fa-trash-can text-red-400 p-2 hover:text-red-600" onclick="event.stopPropagation(); list.splice(${i},1); draw()"></i>` : ''}
                </div>`;
            });
        }

        async function generateFinalLink() {
            const img = document.getElementById('pImg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 150; canvas.height = 150;
            ctx.drawImage(img, 0, 0, 150, 150);
            
            // ضغط JPEG لجعل الرابط أقصر ما يمكن
            const compressedImg = canvas.toDataURL('image/jpeg', 0.2);

            const data = { 
                n: document.getElementById('uName').innerText, 
                b: document.getElementById('uBio').innerText, 
                l: list, 
                c: document.documentElement.style.getPropertyValue('--color-mid'), 
                img: compressedImg 
            };
            
            const s = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const url = window.location.origin + window.location.pathname + "?v=" + s;

            await navigator.clipboard.writeText(url);
            alert("✅ تم النسخ! الأبيض ناصع الآن، الألوان أصلية، والرابط مضغوط لـ 150px.");
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('v')) {
                const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                document.getElementById('uName').innerText = d.n;
                document.getElementById('uBio').innerText = d.b;
                document.getElementById('pImg').src = d.img;
                list = d.l; updateTheme(d.c || '#3b82f6'); draw();
                
                // قفل التعديل النهائي
                ["uName", "uBio"].forEach(id => document.getElementById(id).contentEditable = false);
                ["sidebar", "editorUI", "genBtn", "avatarBox"].forEach(id => {
                   const el = document.getElementById(id);
                   if(el) el.style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
