 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bio-Links | Fixed Colors Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-light: #60a5fa;
            --color-mid: #3b82f6;
            --color-dark: #1d4ed8;
            --glow-color: rgba(59, 130, 246, 0.2);
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #000; overflow: hidden;
        }

        .color-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--color-light), var(--color-mid), var(--color-dark));
            background-size: 400% 400%; animation: vividFlow 15s ease infinite; z-index: -5;
            will-change: background-position; /* تحسين الأداء لتقليل اللاك */
        }

        .marble-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img.jpg/background img.jpg');
            background-size: cover; background-position: center;
            mix-blend-mode: multiply; z-index: -4; filter: contrast(1.1) brightness(0.7);
        }

        .particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; pointer-events: none; }
        .particle {
            position: absolute; border-radius: 50%; background: white; opacity: 0.6;
            box-shadow: 0 0 8px var(--color-light); animation: moveDiagonal 12s linear infinite;
        }

        @keyframes moveDiagonal {
            0% { transform: translate(-10vw, 110vh) scale(0); opacity: 0; }
            50% { opacity: 0.7; transform: translate(45vw, 50vh) scale(1); }
            100% { transform: translate(110vw, -10vh) scale(0.5); opacity: 0; }
        }

        .mouse-glow {
            position: fixed; top: 0; left: 0; width: 250px; height: 250px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: -2; opacity: 0;
            transform: translate(-50%, -50%); transition: opacity 0.8s ease;
            will-change: transform, left, top;
        }

        @keyframes vividFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-card {
            background: rgba(202, 202, 202, 0.94); backdrop-filter: blur(25px);
            border-radius: 50px; padding: 90px 45px; width: 95%; max-width: 520px;
            text-align: center; z-index: 10; box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }

        .has-tip { position: relative; }
        .tip {
            position: absolute; background: rgba(0,0,0,0.85); color: #fff;
            padding: 5px 10px; border-radius: 6px; font-size: 10px;
            opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100;
            white-space: nowrap; visibility: hidden;
        }
        .has-tip:hover .tip { opacity: 1; visibility: visible; transform: translateY(-5px); }

        .avatar-container {
            width: 125px; height: 125px; margin: -125px auto 25px;
            border-radius: 50%; border: 6px solid white;
            background: #fff; overflow: hidden; cursor: pointer;
        }

        .sidebar {
            position: fixed; left: 0; top: 0; width: 65px; height: 100vh;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
            z-index: 100; overflow-y: auto;
        }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; margin-bottom: 15px; cursor: pointer; border: 2px solid white; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.1); }

        footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            padding: 15px 0; color: white; text-align: center; z-index: 50;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="color-layer"></div>
    <div class="marble-layer"></div>
    <div class="particles-container" id="particles"></div>
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="sidebar">
        <div class="has-tip">
            <div class="color-dot" style="background: #3b82f6;" onclick="applyTheme('#3b82f6')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أزرق</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #df0505;" onclick="applyTheme('#df0505')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أحمر</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #fbff03;" onclick="applyTheme('#fbff03')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أصفر</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #1ddf03;" onclick="applyTheme('#1ddf03')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أخضر</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #f103e6;" onclick="applyTheme('#f103e6')"></div>
            <span class="tip" style="right: -80px; top: 5px;">وردي</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #ffffff;" onclick="applyTheme('#ffffff')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أبيض</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #000000;" onclick="applyTheme('#000000')"></div>
            <span class="tip" style="right: -80px; top: 5px;">أسود</span>
        </div>
        <div class="has-tip">
            <div class="color-dot" style="background: #8b5cf6;" onclick="applyTheme('#8b5cf6')"></div>
            <span class="tip" style="right: -90px; top: 5px;">بنفسجي</span>
        </div>
        <label class="w-8 h-8 bg-white rounded-full flex items-center justify-center cursor-pointer has-tip mb-5">
            <i class="fas fa-palette text-gray-700 text-xs"></i>
            <input type="color" oninput="applyTheme(this.value)" class="hidden">
            <span class="tip" style="right: -100px; top: 5px;">لون مخصص</span>
        </label>
    </div>

    <div class="main-card">
        <div class="has-tip">
            <div class="avatar-container" onclick="document.getElementById('imgIn').click()">
                <img id="pImg" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                <input type="file" id="imgIn" hidden onchange="preview(this)">
            </div>
            <span class="tip" style="top: -20px; left: 50%; transform: translateX(-50%);">تغيير الصورة</span>
        </div>

        <div class="has-tip">
            <h1 id="uName" contenteditable="true" class="text-3xl font-black mb-1 outline-none text-gray-800">اسم المستخدم</h1>
            <span class="tip" style="top: -30px; left: 50%; transform: translateX(-50%);">تعديل الاسم</span>
        </div>

        <div class="has-tip">
            <p id="uBio" contenteditable="true" class="text-gray-400 text-xs mb-8 outline-none italic">أدخل وصفاً تعريفياً قصيراً...</p>
            <span class="tip" style="bottom: -25px; left: 50%; transform: translateX(-50%);">تعديل النبذة</span>
        </div>

        <div id="linksBox" class="mb-6"></div>

        <div class="flex gap-2 mb-6" id="inputContainer">
            <input type="text" id="urlIn" class="w-full p-4 bg-gray-50 rounded-xl outline-none text-[10px] border" placeholder="الصق الرابط هنا...">
            <button onclick="add()" class="px-5 bg-white rounded-xl shadow-sm text-blue-600"><i class="fas fa-plus"></i></button>
        </div>

        <button id="saveBtn" onclick="save()" class="w-full py-5 bg-white text-blue-600 rounded-full font-black shadow-lg uppercase text-[9px] tracking-[3px] border border-blue-50 transition hover:bg-blue-50">
            حفظ وتوليد الرابط <i class="fas fa-share-nodes ml-1"></i>
        </button>
    </div>

    <footer>
       <div class="flex justify-center gap-10 mb-2">
        <a href="https://www.instagram.com/hussienofficialo?igsh=MThkNjFjNmozZW44dA==" target="_blank">
            <i class="fab fa-instagram text-xl opacity-60 hover:opacity-100 transition cursor-pointer"></i>
        </a>
        <a href="https://www.linkedin.com/in/hussien-ehab-naeem-76bb053ba?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank">
            <i class="fab fa-linkedin-in text-xl opacity-60 hover:opacity-100 transition cursor-pointer"></i>
        </a>
        <a href="mailto:hussienehabofficial@gmail.com">
            <i class="fas fa-envelope text-xl opacity-60 hover:opacity-100 transition cursor-pointer"></i>
        </a>
        </div>
        <div class="footer-rights"> جميع الحقوق محفوظة © 2026 | All Rights Reserved</div>
    </footer>

    <script>
        const pContainer = document.getElementById('particles');
        function createParticles() {
            pContainer.innerHTML = '';
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 2 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = (Math.random() * 8 + 12) + 's';
                fragment.appendChild(p);
            }
            pContainer.appendChild(fragment);
        }
        createParticles();

        let links = [];
        const iconMap = {'instagram.com': 'fab fa-instagram', 'twitter.com': 'fab fa-twitter', 'x.com': 'fab fa-x-twitter', 'facebook.com': 'fab fa-facebook', 'youtube.com': 'fab fa-youtube', 'tiktok.com': 'fab fa-tiktok', 'linkedin.com': 'fab fa-linkedin-in'};

        function applyTheme(hex) {
            let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            document.documentElement.style.setProperty('--color-light', `rgb(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)})`);
            document.documentElement.style.setProperty('--color-mid', hex);
            document.documentElement.style.setProperty('--color-dark', `rgb(${r*0.1},${g*0.1},${b*0.1})`);
            document.documentElement.style.setProperty('--glow-color', `rgba(${r},${g},${b},0.15)`);
        }

        const glow = document.getElementById('mouseGlow');
        document.body.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
                glow.style.opacity = 1;
            });
        });

        function preview(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => document.getElementById('pImg').src = e.target.result;
                r.readAsDataURL(i.files[0]);
            }
        }

        function add() {
            const v = document.getElementById('urlIn').value;
            if(!v) return;
            links.push(v);
            draw();
            document.getElementById('urlIn').value = '';
        }

        function draw() {
            const box = document.getElementById('linksBox');
            box.innerHTML = '';
            links.forEach((l, i) => {
                let icon = 'fas fa-link';
                for (const key in iconMap) { if (l.includes(key)) icon = iconMap[key]; }
                box.innerHTML += `<div class="link-item">
                    <div class="flex items-center gap-3">
                        <i class="${icon} text-blue-500"></i>
                        <span class="font-bold text-gray-700 text-[10px] truncate w-40 text-right">${l}</span>
                    </div>
                    <i class="fas fa-trash text-red-200 cursor-pointer hover:text-red-500 text-xs" onclick="links.splice(${i},1);draw()"></i>
                </div>`;
            });
        }

        // --- التعديل النهائي الاحترافي لضغط الصورة لـ 150px وتقصير الرابط ---
        function save() {
            const img = document.getElementById('pImg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // ضبط المقاس لـ 150 بكسل بالضبط لضمان عدم ظهور الخطأ في GitHub
            canvas.width = 150;
            canvas.height = 150;
            
            // رسم الصورة في الكانفاس لتصغيرها فعلياً من المصدر
            ctx.drawImage(img, 0, 0, 150, 150);
            
            // تحويلها لـ JPEG بضغط متوسط لتقليل النص لآلاف الحروف فقط بدلاً من الملايين
            const compressedImg = canvas.toDataURL('image/jpeg', 0.6);

            const data = { 
                n: document.getElementById('uName').innerText, 
                b: document.getElementById('uBio').innerText, 
                l: links, 
                c: getComputedStyle(document.documentElement).getPropertyValue('--color-mid').trim(), 
                img: compressedImg 
            };
            
            try {
                const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                const finalUrl = window.location.origin + window.location.pathname + "?v=" + str;
                
                // نسخ الرابط القصير للمقص
                navigator.clipboard.writeText(finalUrl);
                alert("تم الحفظ بنجاح! الرابط الآن مضغوط لـ 150px وسيعمل فوراً. 🚀");
            } catch(e) {
                alert("حدث خطأ أثناء معالجة البيانات.");
            }
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('v')) {
                try {
                    const d = JSON.parse(decodeURIComponent(escape(atob(p.get('v')))));
                    document.getElementById('uName').innerText = d.n; 
                    document.getElementById('uBio').innerText = d.b; 
                    document.getElementById('pImg').src = d.img;
                    links = d.l; 
                    applyTheme(d.c); 
                    draw();
                    
                    // إخفاء الواجهة البرمجية عند عرض البروفايل للآخرين
                    document.querySelector('.sidebar').style.display = 'none';
                    document.getElementById('inputContainer').style.display = 'none';
                    document.getElementById('saveBtn').style.display = 'none';
                    setTimeout(() => {
                        document.querySelectorAll('.fa-trash').forEach(e => e.style.display = 'none');
                    }, 150);
                } catch(e) { console.error("Data error"); }
            }
        }
    </script>
</body>
</html>
